<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmado</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: url('https://img.freepik.com/fotos-gratis/fundo-de-flores-de-rosa-3d-com-espaco-de-copia_23-2151028191.jpg?semt=ais_hybrid&w=740&q=80') no-repeat center center;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  overflow: hidden;
  text-align: center;
  position: relative;
}

/* CAIXA TRANSPARENTE */
.caixa {
  background: rgba(255,255,255,0); /* transparente */
  padding: 30px 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  margin: auto;
  animation: zoomFade 1.2s ease forwards;
}

/* ANIMAÇÃO DE ENTRADA */
@keyframes zoomFade {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

/* TÍTULO */
h1 {
  color: #d6336c;
  font-size: 2rem;
  margin-bottom: 15px;
  line-height: 1.2;
  word-wrap: break-word;
  animation: pulseText 1s infinite alternate;
}

/* NOME DO CONVIDADO */
.nome-convidado {
  font-weight: bold;
  font-size: 1.2rem;
  color: #d6336c;
  animation: pulseText 1s infinite alternate;
}

/* ANIMAÇÃO PULSANTE */
@keyframes pulseText {
  0% { transform: scale(1); text-shadow: 0 0 2px #fff; }
  50% { transform: scale(1.2); text-shadow: 0 0 10px #fff, 0 0 15px #ff69b4; }
  100% { transform: scale(1); text-shadow: 0 0 2px #fff; }
}

p {
  font-size: 1rem;
  margin: 8px 0;
  color: #fff;
  text-shadow: 1px 1px 3px #000;
}

/* CONFETES */
.confete {
  position: absolute;
  width: 10px;
  height: 10px;
  background-color: #ff69b4;
  border-radius: 50%;
  top: 0;
  animation: confeteFall linear forwards;
  opacity: 0.9;
}

@keyframes confeteFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* RESPONSIVIDADE */
@media (max-width: 480px) {
  h1 { font-size: 1.5rem; }
  .nome-convidado { font-size: 1rem; }
  .caixa { padding: 20px 15px; }
}

@media (max-width: 320px) {
  h1 { font-size: 1.3rem; }
  .nome-convidado { font-size: 0.95rem; }
  p { font-size: 0.9rem; }
}
</style>

</head>

<body>

<div class="caixa">
  <h1>🎉 Presença Confirmada!</h1>
  <p>Obrigado <span class="nome-convidado">{{nome}}</span></p>
  <p>Estamos muito felizes com sua presença ❤️</p>
</div>

<script>
// Função para gerar confetes aleatórios
function criarConfete() {
  const confete = document.createElement('div');
  confete.classList.add('confete');
  confete.style.left = Math.random() * window.innerWidth + 'px';
  confete.style.backgroundColor = `hsl(${Math.random()*360}, 70%, 60%)`;
  confete.style.width = confete.style.height = 5 + Math.random()*10 + 'px';
  confete.style.animationDuration = 2 + Math.random()*3 + 's';
  document.body.appendChild(confete);
  setTimeout(() => confete.remove(), 5000);
}

// Cria vários confetes periodicamente
setInterval(criarConfete, 150);
</script>

</body>
</html>
