<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite de Casamento</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#ffdde1,#ee9ca7);
text-align:center;
margin-top:80px;
overflow:hidden;
}

.caixa{

background:white;
padding:40px;
border-radius:20px;
width:320px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

h1{
color:#d6336c;
}

input{

padding:10px;
width:90%;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:20px;

}

button{

padding:15px 25px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;

}

#sim{

background:#28a745;
color:white;

}

#nao{

background:#dc3545;
color:white;
position:absolute;

}

</style>

</head>

<body>

<div class="caixa">

<h1>💍 Convite Especial 💍</h1>

<p>Você aceita participar do nosso casamento?</p>

<form action="/confirmar" method="post">

<input type="text" name="nome" placeholder="Digite seu nome" required>

<br>

<button id="sim" type="submit">
SIM ❤️
</button>

</form>

</div>

<button id="nao">NÃO ❌</button>

<script>

const nao = document.getElementById("nao")

function fugir(){

let largura = window.innerWidth - 120
let altura = window.innerHeight - 120

let x = Math.random()*largura
let y = Math.random()*altura

nao.style.left = x + "px"
nao.style.top = y + "px"

}

nao.addEventListener("mouseover", fugir)
nao.addEventListener("click", fugir)

</script>

</body>
</html>
